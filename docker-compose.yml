version: '3.9'

services:

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - db

  api:
    build:
      
      context: ./server
    
    environment:
      PG_HOST: postgres_db
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  test:
    build:
      context: ./server
      
    environment:
      PG_HOST: postgres_db
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
      NODE_ENV: test
    depends_on:
      - db
    command: npm test -- --coverage
    profiles:
      - test

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db:5432/${PG_DB}
      KC_DB_USERNAME: ${PG_USER}
      KC_DB_PASSWORD: ${PG_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - db

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  #mongo:
   # image: mongo:7
    #container_name: mongo_db
    #restart: always
    #ports:
      #- "${MONGO_PORT}:27017"
    #environment:
    #  MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
    #  MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
     # MONGO_INITDB_DATABASE: ${MONGO_DB}
    #volumes:
    #  - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      discovery.type: ${ELASTIC_DISCOVERY}
      xpack.security.enabled: ${ELASTIC_SECURITY}
    ports:
      - "${ELASTIC_PORT}:9200"

  search-service:
    build:
      context: ./search-service

    volumes:
      - ./search-service:/app
      - /app/node_modules

    environment:
      ELASTIC_URL: ${ELASTIC_URL}
      API_URL: ${API_URL}

    depends_on:
      - elasticsearch
      - api
      
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - search-service


  # ─────────────────────────────────────────────
  # SHARD 1 — rsProducts (menus/productos)
  # ─────────────────────────────────────────────
  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["mongod", "--replSet", "rsProducts", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo1_data:/data/db
    profiles: ["full"]
 
  mongo2:
    image: mongo:7
    container_name: mongo2
    command: ["mongod", "--replSet", "rsProducts", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo2_data:/data/db
    profiles: ["full"]
 
  mongo3:
    image: mongo:7
    container_name: mongo3
    command: ["mongod", "--replSet", "rsProducts", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo3_data:/data/db
    profiles: ["full"]
 
  # ─────────────────────────────────────────────
  # SHARD 2 — rsReservations (reservas)
  # ─────────────────────────────────────────────
  mongo4:
    image: mongo:7
    container_name: mongo4
    command: ["mongod", "--replSet", "rsReservations", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo4_data:/data/db
    profiles: ["full"]
 
  mongo5:
    image: mongo:7
    container_name: mongo5
    command: ["mongod", "--replSet", "rsReservations", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo5_data:/data/db
    profiles: ["full"]
 
  mongo6:
    image: mongo:7
    container_name: mongo6
    command: ["mongod", "--replSet", "rsReservations", "--shardsvr", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo6_data:/data/db
    profiles: ["full"]
 
  # ─────────────────────────────────────────────
  # Config Server (para el router mongos)
  # ─────────────────────────────────────────────
  configsvr:
    image: mongo:7
    container_name: configsvr
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27019"]
    volumes:
      - configsvr_data:/data/configdb
    profiles: ["full"]
 
  # ─────────────────────────────────────────────
  # Router Mongos
  # ─────────────────────────────────────────────
  mongos:
    image: mongo:7
    container_name: mongos
    command: >
      mongos
      --configdb cfgRS/configsvr:27019
      --bind_ip_all
    ports:
      - "27020:27017"
    depends_on:
      - configsvr
      - mongo1
      - mongo2
      - mongo3
      - mongo4
      - mongo5
      - mongo6
    profiles: ["full"]
 
  # ─────────────────────────────────────────────
  # Inicialización — un solo contenedor bash
  # ─────────────────────────────────────────────
  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
      - mongo4
      - mongo5
      - mongo6
      - configsvr
      - mongos
    volumes:
      - ./mongo-init:/scripts
    entrypoint: ["bash", "/scripts/init.sh"]
    profiles: ["full"]
 


# OLAP

  postgres_hive:
    image: postgres:16
    container_name: postgres_hive
    restart: always
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive123
      POSTGRES_DB: metastore
    ports:
      - "5433:5432"

    volumes:
      - postgres_hive_data:/var/lib/postgresql/data

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      - postgres_hive
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "false"
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres_hive:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123

    volumes:
      - ./hive/lib/postgresql-42.7.3.jar:/opt/hive/lib/postgresql-42.7.3.jar

  hive-server:
  
    image: apache/hive:3.1.3
    container_name: hive-server
    depends_on:
      - hive-metastore
    environment:
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: >
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"

    volumes:
      - ./hive/lib/postgresql-42.7.3.jar:/opt/hive/lib/postgresql-42.7.3.jar
      - hive_warehouse:/opt/hive/data/warehouse
      
  spark-service:
    build:
      context: ./spark-service
    container_name: spark-service
    volumes:
      - ./spark-service:/app
      - hive_warehouse:/opt/hive/data/warehouse   
      - spark_ivy_cache:/root/.ivy2
    depends_on:
      - hive-server
    restart: "no"
    environment:
      - PYSPARK_SUBMIT_ARGS=pyspark-shell
      - PYTHONPATH=/app
    mem_limit: 2g
    ports:
      - "8000:8000"

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${PG_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${PG_USER}
      MB_DB_PASS: ${PG_PASSWORD}
      MB_DB_HOST: postgres_db
    volumes:
      - metabase_data:/metabase.db
    networks:
      - default

networks:
  default:
    name: tarea1bd2-network

  
      
volumes:
 
  postgres_hive_data:
  postgres_data:
  hive_warehouse:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  mongo4_data:
  mongo5_data:
  mongo6_data:
  configsvr_data:
  spark_ivy_cache:
  metabase_data: