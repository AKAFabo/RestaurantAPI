version: '3.9'

services:

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - db

  api:
    build:
      
      context: ./server
    ports:
      - "3001:3001"
    environment:
      PG_HOST: postgres_db
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  test:
    build:
      context: ./server
      
    environment:
      PG_HOST: postgres_db
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
      NODE_ENV: test
    depends_on:
      - db
    command: npm test -- --coverage
    profiles:
      - test

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db:5432/${PG_DB}
      KC_DB_USERNAME: ${PG_USER}
      KC_DB_PASSWORD: ${PG_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - db

  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      discovery.type: ${ELASTIC_DISCOVERY}
      xpack.security.enabled: ${ELASTIC_SECURITY}
    ports:
      - "${ELASTIC_PORT}:9200"

  search-service:
    build:
      context: ./search-service
    ports:
      - "${SEARCH_PORT}:4000"
    environment:
      ELASTIC_URL: ${ELASTIC_URL}
      API_URL: ${API_URL}
    depends_on:
      - elasticsearch
      - api
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - search-service

volumes:
  postgres_data:
  mongo_data: